name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install image tools
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Build release
        run: cargo build --release

      - name: Prepare AppDir
        run: |
          mkdir -p dist/AppDir/usr/bin dist/AppDir/usr/share/applications dist/AppDir/usr/share/metainfo
          cp target/release/cliptube-ai dist/AppDir/usr/bin/cliptube-ai
          cat > dist/AppDir/usr/share/applications/io.github.cliptubeai.ClipTubeAI.desktop <<'DESKTOP'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=ClipTube AI
          Comment=AI-powered YouTube transcript, summary and chat assistant
          Exec=cliptube-ai
          Icon=io.github.cliptubeai.ClipTubeAI
          Terminal=false
          Categories=AudioVideo;Utility;
          Keywords=cliptube;youtube;transcript;summary;chat;ollama;rust;
          StartupNotify=true
          DESKTOP
          cat > dist/AppDir/AppRun <<'SH'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/cliptube-ai" "$@"
          SH
          chmod +x dist/AppDir/AppRun
          magick assets/icon.svg -resize 512x512 dist/AppDir/io.github.cliptubeai.ClipTubeAI.png
          cp dist/AppDir/io.github.cliptubeai.ClipTubeAI.png dist/AppDir/cliptube-ai.png
          cp dist/AppDir/io.github.cliptubeai.ClipTubeAI.png dist/AppDir/.DirIcon
          cp dist/AppDir/usr/share/applications/io.github.cliptubeai.ClipTubeAI.desktop dist/AppDir/io.github.cliptubeai.ClipTubeAI.desktop
          cat > dist/AppDir/usr/share/metainfo/io.github.cliptubeai.ClipTubeAI.appdata.xml <<'XML'
          <?xml version="1.0" encoding="UTF-8"?>
          <component type="desktop-application">
            <id>io.github.cliptubeai.ClipTubeAI</id>
            <name>ClipTube AI</name>
            <summary>AI-powered YouTube transcript, summary and chat assistant</summary>
            <metadata_license>MIT</metadata_license>
            <project_license>MIT</project_license>
            <description>
              <p>ClipTube AI turns YouTube videos into transcripts, summaries, key points and ready-to-share text.</p>
            </description>
            <launchable type="desktop-id">io.github.cliptubeai.ClipTubeAI.desktop</launchable>
            <provides>
              <binary>cliptube-ai</binary>
            </provides>
            <url type="homepage">${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}</url>
          </component>
          XML

      - name: Download appimagetool
        run: |
          mkdir -p tools
          curl -L https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -o tools/appimagetool.AppImage
          curl -L https://github.com/AppImage/type2-runtime/releases/download/continuous/runtime-x86_64 -o tools/runtime-x86_64
          chmod +x tools/appimagetool.AppImage
          chmod +x tools/runtime-x86_64

      - name: Build AppImage
        run: |
          APPIMAGE_EXTRACT_AND_RUN=1 ./tools/appimagetool.AppImage \
            --no-appstream \
            --runtime-file tools/runtime-x86_64 \
            dist/AppDir dist/cliptube-ai-linux-x86_64.AppImage

      - name: Build Linux tarball
        run: |
          VERSION_NO_V="${VERSION#v}"
          PACKAGE_DIR="dist/cliptube-ai-v${VERSION_NO_V}-linux-x86_64"
          mkdir -p "${PACKAGE_DIR}/packaging" "${PACKAGE_DIR}/assets"
          cp target/release/cliptube-ai "${PACKAGE_DIR}/cliptube-ai"
          cp README.md "${PACKAGE_DIR}/README.md"
          cp assets/icon.svg "${PACKAGE_DIR}/assets/icon.svg"
          cp packaging/install-desktop.sh "${PACKAGE_DIR}/packaging/install-desktop.sh"
          cat > "${PACKAGE_DIR}/packaging/cliptube-ai.desktop" <<'DESKTOP'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=ClipTube AI
          Comment=AI-powered YouTube transcript, summary and chat assistant
          Exec=cliptube-ai
          Icon=cliptube-ai
          Terminal=false
          Categories=AudioVideo;Utility;
          Keywords=cliptube;youtube;transcript;summary;chat;ollama;rust;
          StartupNotify=true
          DESKTOP
          tar -C dist -czf "dist/cliptube-ai-v${VERSION_NO_V}-linux-x86_64.tar.gz" "cliptube-ai-v${VERSION_NO_V}-linux-x86_64"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/cliptube-ai-linux-x86_64.AppImage
            dist/cliptube-ai-v*-linux-x86_64.tar.gz
            assets/icon.svg
            assets/icon.ico
            assets/icon.icns
          generate_release_notes: true

  build-macos:
    name: Build macOS Intel + Apple Silicon + Universal
    runs-on: macos-14
    env:
      VERSION: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build Intel and Apple Silicon binaries
        run: |
          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin

      - name: Create universal binary
        run: |
          mkdir -p target/universal/release
          lipo -create \
            target/x86_64-apple-darwin/release/cliptube-ai \
            target/aarch64-apple-darwin/release/cliptube-ai \
            -output target/universal/release/cliptube-ai

      - name: Build .app bundles
        run: |
          VERSION_NO_V="${VERSION#v}"
          bash packaging/macos/create-app-bundle.sh "${VERSION_NO_V}" "intel-x86_64" "target/x86_64-apple-darwin/release/cliptube-ai"
          bash packaging/macos/create-app-bundle.sh "${VERSION_NO_V}" "apple-silicon" "target/aarch64-apple-darwin/release/cliptube-ai"
          bash packaging/macos/create-app-bundle.sh "${VERSION_NO_V}" "universal" "target/universal/release/cliptube-ai"

      - name: Build DMGs
        run: |
          bash packaging/macos/create-dmg.sh "intel-x86_64"
          bash packaging/macos/create-dmg.sh "apple-silicon"
          bash packaging/macos/create-dmg.sh "universal"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/macos/cliptube-ai-macos-intel-x86_64-app.zip
            dist/macos/cliptube-ai-macos-intel-x86_64.dmg
            dist/macos/cliptube-ai-macos-apple-silicon-app.zip
            dist/macos/cliptube-ai-macos-apple-silicon.dmg
            dist/macos/cliptube-ai-macos-universal-app.zip
            dist/macos/cliptube-ai-macos-universal.dmg
          generate_release_notes: true

  build-windows:
    name: Build Windows package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Package zip
        shell: pwsh
        run: ./packaging/windows/package.ps1 -Version "${env:GITHUB_REF_NAME}".TrimStart('v')

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/windows/cliptube-ai-windows-x86_64.zip
          generate_release_notes: true
